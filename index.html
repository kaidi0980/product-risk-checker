<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虚拟产品风险评测工具</title>
    <style>
:root {
  color-scheme: light;
  --ink: #202124;
  --muted: #6b6f76;
  --line: #d9dde3;
  --paper: #fbfaf7;
  --panel: #ffffff;
  --panel-2: #f1f4f7;
  --accent: #126f83;
  --accent-2: #d6a43b;
  --danger: #b73333;
  --warning: #b66b12;
  --good: #22734c;
  --shadow: 0 18px 50px rgba(24, 33, 44, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(90deg, rgba(18, 111, 131, 0.08) 1px, transparent 1px),
    linear-gradient(0deg, rgba(18, 111, 131, 0.07) 1px, transparent 1px),
    var(--paper);
  background-size: 36px 36px;
  color: var(--ink);
  font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

button,
input,
select,
textarea {
  font: inherit;
}

.shell {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding: 28px;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(360px, 0.86fr) minmax(420px, 1.14fr);
  gap: 18px;
  min-height: calc(100vh - 56px);
}

.panel {
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(32, 33, 36, 0.12);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.input-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 22px;
}

.report-panel {
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.brand-row,
.report-header,
.section-title,
.action-row {
  display: flex;
  align-items: center;
}

.brand-row,
.report-header,
.section-title {
  justify-content: space-between;
  gap: 16px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1 {
  font-size: clamp(25px, 3vw, 42px);
  line-height: 1.05;
  letter-spacing: 0;
}

h2 {
  font-size: clamp(24px, 3vw, 46px);
  line-height: 1;
  letter-spacing: 0;
}

h3 {
  font-size: 15px;
}

.status-pill,
.section-title span {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--muted);
  background: #fff;
  font-size: 12px;
  font-weight: 700;
}

.field {
  display: grid;
  gap: 7px;
}

.field span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  color: var(--ink);
  outline: none;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}

input,
select {
  min-height: 44px;
  padding: 0 12px;
}

textarea {
  resize: vertical;
  padding: 12px;
  line-height: 1.65;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(18, 111, 131, 0.14);
}

.upload-zone {
  display: grid;
  place-items: center;
  gap: 6px;
  min-height: 154px;
  border: 1.5px dashed rgba(18, 111, 131, 0.42);
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(18, 111, 131, 0.08), rgba(214, 164, 59, 0.12));
  cursor: pointer;
  text-align: center;
  transition: transform 160ms ease, border-color 160ms ease;
}

.upload-zone:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
}

.upload-zone input {
  display: none;
}

.upload-icon {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 30px;
  line-height: 1;
}

.upload-zone small {
  color: var(--muted);
}

.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 10px;
}

.preview-item {
  margin: 0;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  overflow: hidden;
}

.preview-item img {
  display: block;
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
}

.preview-item figcaption {
  padding: 6px;
  color: var(--muted);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.action-row {
  gap: 10px;
  flex-wrap: wrap;
}

button {
  border: 0;
  border-radius: 7px;
  min-height: 42px;
  padding: 0 16px;
  cursor: pointer;
  font-weight: 800;
}

.primary-btn {
  background: var(--accent);
  color: #fff;
  flex: 1;
  min-width: 150px;
}

.ghost-btn {
  background: var(--panel-2);
  color: var(--ink);
  border: 1px solid var(--line);
}

.icon-only {
  width: 42px;
  padding: 0;
  font-size: 24px;
}

.api-note {
  border-top: 1px solid var(--line);
  padding-top: 10px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.api-note summary {
  cursor: pointer;
  color: var(--ink);
  font-weight: 800;
}

.score-ring {
  --score: 0;
  width: 96px;
  aspect-ratio: 1;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle closest-side, #fff 68%, transparent 70%),
    conic-gradient(var(--accent) calc(var(--score) * 1%), #e7eaee 0);
  border: 1px solid var(--line);
}

.score-ring span {
  font-size: 26px;
  font-weight: 900;
}

.decision-card {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: start;
  padding: 16px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--panel-2);
}

.decision-dot {
  width: 12px;
  height: 12px;
  margin-top: 4px;
  border-radius: 50%;
  background: var(--accent);
}

.decision-card strong {
  display: block;
  margin-bottom: 5px;
}

.decision-card p,
.clean-list,
.rewrite-grid p {
  color: var(--muted);
  line-height: 1.65;
}

.result-section,
.rewrite-box {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.72);
  padding: 14px;
}

.tag-list,
.term-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.tag-list span,
.term-list span {
  border-radius: 999px;
  padding: 7px 10px;
  font-size: 13px;
  font-weight: 800;
}

.tag-list span {
  background: rgba(183, 51, 51, 0.09);
  color: var(--danger);
}

.term-list span {
  background: rgba(18, 111, 131, 0.1);
  color: var(--accent);
}

.clean-list {
  display: grid;
  gap: 9px;
  margin: 12px 0 0;
  padding-left: 19px;
}

.rewrite-grid {
  display: grid;
  gap: 12px;
  margin-top: 12px;
}

.rewrite-grid div {
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}

.rewrite-grid span {
  display: block;
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.empty-state {
  color: var(--muted);
  font-size: 14px;
}

.level-low {
  --accent: var(--good);
}

.level-medium {
  --accent: var(--warning);
}

.level-high,
.level-critical {
  --accent: var(--danger);
}

@media (max-width: 920px) {
  .shell {
    padding: 14px;
  }

  .workspace {
    grid-template-columns: 1fr;
    min-height: auto;
  }

  .report-header {
    align-items: start;
  }

  .score-ring {
    width: 78px;
  }
}

</style>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="panel input-panel">
          <div class="brand-row">
            <div>
              <p class="eyebrow">Virtual Product Guard</p>
              <h1>虚拟产品风险评测</h1>
            </div>
            <span class="status-pill">MVP</span>
          </div>

          <label class="field">
            <span>目标平台</span>
            <select id="platform">
              <option value="xianyu">闲鱼</option>
              <option value="xiaohongshu">小红书</option>
              <option value="taobao">淘宝</option>
              <option value="generic">通用平台</option>
            </select>
          </label>

          <label class="upload-zone" for="screenshots">
            <input id="screenshots" type="file" accept="image/*" multiple />
            <span class="upload-icon">+</span>
            <strong>上传产品截图</strong>
            <small>支持主图、标题、详情页、聊天交付页</small>
          </label>

          <div id="previewGrid" class="preview-grid" aria-live="polite"></div>

          <label class="field">
            <span>商品标题</span>
            <input id="title" type="text" placeholder="例如：自用整理 Excel 记账表模板" />
          </label>

          <label class="field">
            <span>截图/详情页文字</span>
            <textarea id="description" rows="8" placeholder="把截图里能看到的标题、主图文字、详情页、交付承诺粘贴到这里"></textarea>
          </label>

          <div class="action-row">
            <button id="analyzeBtn" class="primary-btn" type="button">开始评测</button>
            <button id="sampleBtn" class="ghost-btn" type="button">填入高危样例</button>
            <button id="clearBtn" class="ghost-btn icon-only" type="button" aria-label="清空">×</button>
          </div>

          <details class="api-note" open>
            <summary>免费静态版说明</summary>
            <p>截图只用于预览，请把截图里的商品标题、主图文字、详情页文案粘贴到上方输入框。所有分析都在浏览器本地完成，不需要服务器和海外网络。</p>
          </details>
        </div>

        <div class="panel report-panel">
          <div class="report-header">
            <div>
              <p class="eyebrow">Risk Report</p>
              <h2 id="riskLabel">等待评测</h2>
            </div>
            <div class="score-ring" id="scoreRing" style="--score: 0">
              <span id="scoreValue">0</span>
            </div>
          </div>

          <div class="decision-card" id="decisionCard">
            <span class="decision-dot"></span>
            <div>
              <strong id="decisionTitle">请上传截图或输入产品信息</strong>
              <p id="platformNote">系统会根据虚拟产品规则库输出风险等级、命中原因和优化建议。</p>
            </div>
          </div>

          <section class="result-section">
            <div class="section-title">
              <h3>风险标签</h3>
              <span id="tagCount">0</span>
            </div>
            <div id="riskTags" class="tag-list empty-state">暂无命中</div>
          </section>

          <section class="result-section">
            <div class="section-title">
              <h3>命中词</h3>
              <span id="termCount">0</span>
            </div>
            <div id="detectedTerms" class="term-list empty-state">暂无命中</div>
          </section>

          <section class="result-section">
            <div class="section-title">
              <h3>主要原因</h3>
            </div>
            <ul id="reasons" class="clean-list empty-state">
              <li>等待评测结果</li>
            </ul>
          </section>

          <section class="result-section">
            <div class="section-title">
              <h3>优化建议</h3>
            </div>
            <ul id="suggestions" class="clean-list empty-state">
              <li>等待评测结果</li>
            </ul>
          </section>

          <section class="rewrite-box">
            <div class="section-title">
              <h3>合规表达参考</h3>
            </div>
            <div class="rewrite-grid">
              <div>
                <span>标题</span>
                <p id="rewriteTitle">暂无</p>
              </div>
              <div>
                <span>详情</span>
                <p id="rewriteDescription">暂无</p>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module">
const RULES = [
  {
    id: "adult",
    tag: "低俗/涉黄风险",
    weight: 100,
    severity: "block",

    suggestion: "不要上架涉黄、低俗、擦边或暗示性资源类商品。",
  },
  {
    id: "deepfake",
    tag: "AI换脸风险",
    weight: 100,

  {
    id: "copyright",

    weight: 42,
    severity: "high",
    patterns: ["盗版", "破解版", "破解", "搬运", "付费课程", "课程合集", "教程合集", "素材合集", "无授权", "低价课", "电子书合集", "院线电影", "影视剧合集"],
    reason: "商品描述疑似涉及未授权搬运、课程、软件或素材售卖。",
    suggestion: "只售卖自有版权、原创整理或已获授权的内容，并保留授权或原创证明。",
  },
  {
    id: "video",
    tag: "影视资源风险",
    weight: 55,
    severity: "block",
    patterns: ["影视资源", "影视剧", "电影资源", "院线电影", "美剧", "韩剧", "日剧", "网剧合集", "高清电影", "追剧资源"],
    reason: "影视、院线、剧集资源通常涉及版权，平台处罚和权利人投诉风险都很高。",
    suggestion: "不要售卖影视剧、电影、综艺、网盘观影资源或相关下载服务。",
  },
  {
    id: "cloud",
    tag: "网盘资源风险",
    weight: 30,
    severity: "high",
    patterns: ["百度云", "百度网盘", "阿里云盘", "夸克网盘", "网盘资源", "网盘链接", "云盘资源", "提取码"],
    reason: "网盘交付常与版权资源、站外引流和交付纠纷绑定。",
    suggestion: "避免使用网盘资源售卖表达；如为原创资料，改为明确的原创资料交付说明。",
  },
  {
    id: "member",
    tag: "会员/充值风险",
    weight: 45,
    severity: "high",
    patterns: ["会员充值", "低价充值", "代充", "直充", "svip", "Svip", "SVIP", "苹果音乐", "Apple Music", "影视会员", "网盘会员", "话费充值"],
    reason: "会员、充值、代充类商品容易涉及非官方渠道、售后纠纷或欺诈投诉。",
    suggestion: "没有官方授权、正规票据和稳定售后能力时，不建议做会员充值或代充类产品。",
  },
  {
    id: "finance",
    tag: "金融/投资风险",
    weight: 75,
    severity: "block",
    patterns: ["炒股", "荐股", "内部消息", "股票资料", "虚拟货币", "币圈", "博彩", "彩票预测", "投资秘籍"],
    reason: "金融投资、荐股、虚拟货币和博彩相关内容容易触发监管与平台禁售规则。",
    suggestion: "不要售卖投资荐股、虚拟货币、博彩预测或暗示稳赚的资料服务。",
  },
  {
    id: "privacy",
    tag: "实名/隐私风险",
    weight: 85,
    severity: "block",
    patterns: ["电话卡", "实名号", "改实名", "解实名", "账号买卖", "定位查询", "查档", "开盒", "隐私查询"],
    reason: "实名、账号、电话卡和隐私查询类商品涉及个人信息与平台红线。",
    suggestion: "放弃实名、账号、隐私数据、电话卡倒卖或查询服务。",
  },
  {
    id: "medical",
    tag: "医疗/保健资质风险",
    weight: 70,
    severity: "high",
    patterns: ["医疗器械", "药品", "处方药", "减肥药", "壮阳", "保健品", "治疗", "根治", "诊断"],
    reason: "医疗、药品和保健功效类商品通常需要资质，且宣传限制严格。",
    suggestion: "没有对应经营资质和合规证明时，不要售卖或宣传医疗、药品、保健功效产品。",
  },
  {
    id: "traffic",
    tag: "站外引流风险",
    weight: 42,
    severity: "high",
    patterns: ["微信", "vx", "V信", "加我", "私聊领取", "扫码", "二维码", "公众号", "外链", "链接领取", "联系客服领取"],
    reason: "商品页或沟通中出现站外联系方式、二维码、外链，容易被判定为引流。",
    suggestion: "删除二维码、微信号、外链、站外领取等内容，交付和售后尽量留在平台内完成。",
  },
  {
    id: "business",
    tag: "经营性描述风险",
    weight: 24,
    severity: "medium",
    patterns: ["自动发货", "秒发", "永久更新", "售后答疑", "七天无理由", "一手货源", "多规格", "长期更新", "批量"],
    reason: "经营性话术可能让个人闲置商品被识别为持续经营商品。",
    suggestion: "如果定位个人闲置，减少经营性承诺；若实际经营，应按平台商家规则补齐资质和售后责任。",
  },
  {
    id: "absolute",
    tag: "夸大宣传风险",
    weight: 16,
    severity: "medium",
    patterns: ["最好", "最佳", "最强", "顶级", "稳赚", "暴利", "包过", "100%有效", "永久有效"],
    reason: "绝对化、夸大或收益承诺表达容易触发审核和投诉。",
    suggestion: "改为客观描述内容范围、适用人群、交付形式和真实限制。",
  },
];

const LEVELS = [
  { level: "critical", label: "极高风险", min: 90, canList: false },
  { level: "high", label: "高风险", min: 65, canList: false },
  { level: "medium", label: "中风险", min: 35, canList: true },
  { level: "low", label: "低风险", min: 0, canList: true },
];

const PLATFORM_NOTES = {
  xianyu: "闲鱼场景重点关注个人闲置与经营性卖家的边界、引流、版权投诉和重复售卖。",
  xiaohongshu: "小红书场景重点关注电子资源类目资质、原创证明、交付举证和内容种草合规。",
  taobao: "淘宝场景重点关注知识产权投诉、授权链路、商品详情证据和交易售后。",
  generic: "通用场景重点关注版权、禁售类目、引流、夸大宣传和交付纠纷。",
};

function normalizeText(value) {
  return String(value || "")
    .replace(/\s+/g, " ")
    .trim();
}

function unique(items) {
  return [...new Set(items)];
}

function findMatches(text, patterns) {
  const lowerText = text.toLowerCase();
  return patterns.filter((pattern) => lowerText.includes(String(pattern).toLowerCase()));
}

function getLevel(score, hasBlockRule) {
  if (hasBlockRule && score >= 75) {
    return LEVELS[0];
  }
  return LEVELS.find((item) => score >= item.min) || LEVELS.at(-1);
}

function analyzeProductRisk(input = {}) {
  const title = normalizeText(input.title);
  const description = normalizeText(input.description);
  const ocrText = normalizeText(input.ocrText);
  const platform = input.platform || "generic";
  const combined = [title, description, ocrText].filter(Boolean).join(" ");

  const hits = RULES.map((rule) => {
    const matches = findMatches(combined, rule.patterns);
    return matches.length ? { ...rule, matches } : null;
  }).filter(Boolean);

  const scoreFromRules = hits.reduce((sum, rule) => sum + rule.weight, 0);
  const score = Math.min(100, scoreFromRules);
  const hasBlockRule = hits.some((rule) => rule.severity === "block");
  const level = getLevel(score, hasBlockRule);
  const cleanSuggestions = [
    ...hits.map((rule) => rule.suggestion),
    "补充商品来源、原创说明、授权证明或交付边界，方便平台审核和售后举证。",
  ];

  if (!hits.some((rule) => rule.id === "copyright")) {
    cleanSuggestions.push("如果商品包含模板、素材、课程或品牌元素，务必确认版权和商用授权。");
  }

  if (score < 35) {
    cleanSuggestions.push("保留原创底稿、制作记录或授权文件，商品页写清楚交付内容和不包含的范围。");
  }

  return {
    score,
    level: level.level,
    levelLabel: level.label,
    canList: level.canList && !hasBlockRule,
    platform,
    platformNote: PLATFORM_NOTES[platform] || PLATFORM_NOTES.generic,
    riskTags: unique(hits.map((rule) => rule.tag)),
    detectedTerms: unique(hits.flatMap((rule) => rule.matches)),
    reasons: hits.map((rule) => rule.reason),
    suggestions: unique(cleanSuggestions),
    safeRewrite: buildSafeRewrite({ title, description, hits }),
    ruleHits: hits.map((rule) => ({
      id: rule.id,
      tag: rule.tag,
      weight: rule.weight,
      severity: rule.severity,
      matches: rule.matches,
    })),
  };
}

function buildSafeRewrite({ title, description, hits }) {
  const highRisk = hits.some((rule) => rule.severity === "block" || rule.id === "copyright" || rule.id === "member");
  if (highRisk) {
    return {
      title: "不建议改写上架",
      description: "该商品方向本身存在较高违规或侵权风险，建议更换为原创资料、合规服务或有授权证明的产品。",
    };
  }

  const baseTitle = title || "个人自用整理资料";
  const baseDescription = description || "个人整理内容，包含使用说明和交付范围。";

  return {
    title: baseTitle
      .replace(/自动发货|秒发|永久更新|七天无理由|售后答疑/g, "")
      .replace(/\s+/g, " ")
      .trim(),
    description: `${baseDescription.replace(/微信|二维码|扫码|外链|加我|私聊领取/g, "平台内沟通")}\n建议补充：资料来源、原创/授权说明、交付清单、适用范围和售后边界。`,
  };
}





const els = {
  platform: document.querySelector("#platform"),
  screenshots: document.querySelector("#screenshots"),
  previewGrid: document.querySelector("#previewGrid"),
  title: document.querySelector("#title"),
  description: document.querySelector("#description"),
  analyzeBtn: document.querySelector("#analyzeBtn"),
  sampleBtn: document.querySelector("#sampleBtn"),
  clearBtn: document.querySelector("#clearBtn"),
  riskLabel: document.querySelector("#riskLabel"),
  scoreRing: document.querySelector("#scoreRing"),
  scoreValue: document.querySelector("#scoreValue"),
  decisionCard: document.querySelector("#decisionCard"),
  decisionTitle: document.querySelector("#decisionTitle"),
  platformNote: document.querySelector("#platformNote"),
  riskTags: document.querySelector("#riskTags"),
  tagCount: document.querySelector("#tagCount"),
  detectedTerms: document.querySelector("#detectedTerms"),
  termCount: document.querySelector("#termCount"),
  reasons: document.querySelector("#reasons"),
  suggestions: document.querySelector("#suggestions"),
  rewriteTitle: document.querySelector("#rewriteTitle"),
  rewriteDescription: document.querySelector("#rewriteDescription"),
};

const LEVEL_CLASS = {
  low: "level-low",
  medium: "level-medium",
  high: "level-high",
  critical: "level-critical",
};

els.screenshots.addEventListener("change", renderPreviews);
els.analyzeBtn.addEventListener("click", runAnalysis);
els.sampleBtn.addEventListener("click", fillSample);
els.clearBtn.addEventListener("click", clearAll);

function renderPreviews() {
  els.previewGrid.innerHTML = "";
  const files = [...els.screenshots.files].slice(0, 8);

  files.forEach((file) => {
    const url = URL.createObjectURL(file);
    const item = document.createElement("figure");
    item.className = "preview-item";
    item.innerHTML = `
      <img src="${url}" alt="${escapeHtml(file.name)}" />
      <figcaption>${escapeHtml(file.name)}</figcaption>
    `;
    item.querySelector("img").addEventListener("load", () => URL.revokeObjectURL(url), { once: true });
    els.previewGrid.append(item);
  });
}

function runAnalysis() {
  renderReport(analyzeLocally());
}

function renderReport(report) {
  document.body.classList.remove(...Object.values(LEVEL_CLASS));
  document.body.classList.add(LEVEL_CLASS[report.level]);

  els.riskLabel.textContent = report.levelLabel;
  els.scoreValue.textContent = report.score;
  els.scoreRing.style.setProperty("--score", report.score);
  els.decisionTitle.textContent = report.canList ? "可谨慎上架，建议按提示优化" : "不建议上架，先处理高危问题";
  els.platformNote.textContent = report.platformNote;
  els.decisionCard.dataset.level = report.level;

  renderPills(els.riskTags, report.riskTags, "tag");
  renderPills(els.detectedTerms, report.detectedTerms, "term");
  els.tagCount.textContent = report.riskTags.length;
  els.termCount.textContent = report.detectedTerms.length;

  renderList(els.reasons, report.reasons.length ? report.reasons : ["未命中明显高危规则，仍需确认版权、授权和交付边界。"]);
  renderList(els.suggestions, report.suggestions);
  els.rewriteTitle.textContent = report.safeRewrite.title;
  els.rewriteDescription.textContent = report.safeRewrite.description;
}

function renderPills(container, items, className) {
  container.className = items.length ? `${className}-list` : `${className}-list empty-state`;
  container.innerHTML = "";

  if (!items.length) {
    container.textContent = "暂无命中";
    return;
  }

  items.forEach((item) => {
    const pill = document.createElement("span");
    pill.textContent = item;
    container.append(pill);
  });
}

function renderList(container, items) {
  container.classList.remove("empty-state");
  container.innerHTML = "";
  items.forEach((item) => {
    const li = document.createElement("li");
    li.textContent = item;
    container.append(li);
  });
}

function fillSample() {
  els.platform.value = "xianyu";
  els.title.value = "高清国外影视剧合集 百度云网盘资源 秒发";
  els.description.value = "热门院线电影、美剧、韩剧资源，自动发货，永久更新。扫码联系客服，微信领取提取码。";
  runAnalysis();
}

function clearAll() {
  els.platform.value = "xianyu";
  els.screenshots.value = "";
  els.previewGrid.innerHTML = "";
  els.title.value = "";
  els.description.value = "";
  renderReport(analyzeProductRisk({ platform: "xianyu" }));
}

function analyzeLocally() {
  return analyzeProductRisk({
    platform: els.platform.value,
    title: els.title.value,
    description: els.description.value,
  });
}


function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    };
    return chars[char];
  });
}
